<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos Indies - CarlinhosGames</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: #00ffff;
            color: black;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 0, 255, 0.3);
            transition: 0.3s;
        }

        footer {
            margin-top: 40px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>🎮 Jogos Indies em Destaque</h1>

    <table>
        <thead>
            <tr>
                <th>Nome</th>

            </tr>
        </thead>
        <tbody>
            <tr>

            </tr>
            <tr>
                <td>Celeste</td>

                <td>R$ 36,99</td>
            </tr>
            <tr>
                <td>Stardew Valley</td>
                <td>26/02/2016</td>
                <td>R$ 24,99</td>
            </tr>
            <tr>
                <td>Dead Cells</td>
                <td>07/08/2018</td>
                <td>R$ 47,49</td>
            </tr>
            <tr>
                <td>Undertale</td>

            </tr>
        </tbody>
    </table>

    <footer>

</body>
</html>
