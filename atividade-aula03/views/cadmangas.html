{% extends 'base.html' %}
{% block content %}
<main>
    <h2>Cadastro de mangas</h2>
    <hr>

    <form action="{{url_for('cadmangas')}}" method="post" class="cadastro-form">
        <label>Titulo</label>
        <input type="text" name="titulo" placeholder="Insira o titulo do manga." required class="form-control">

        <label>Ano</label>
        <input type="text" name="ano" placeholder="Insira o ano do manga." required class="form-control">

        <label>Categoria</label>
        <input type="text" name="categoria" placeholder="Insira a categoria do manga." required class="form-control">

        <label>Editora</label>
        <input type="text" name="plataforma" placeholder="Insira a editora do manga." required class="form-control">

        <div class="cadastro-actions">
            <input type="submit" value="Cadastrar" class="btn btn-success">
            <input type="reset" value="Limpar" class="btn btn-danger">
        </div>
    </form>
    <br>
    <hr>
    <h4>Mangas cadastrados</h4>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Titulo</th>
                <th>Ano</th>
                <th>Categoria</th>
                <th>Editora</th>
            </tr>
        </thead>
        <tbody>
            {% for manga in listaMangas %}
            <tr>
                <td>{{manga.titulo}}</td>
                <td>{{manga.ano}}</td>
                <td>{{manga.categoria}}</td>
                <td>{{manga.plataforma}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</main>
{% endblock content %}
