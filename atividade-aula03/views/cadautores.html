{% extends 'base.html' %}
{% block content %}
<main>
    <h2>Cadastro de autores</h2>
    <hr>

    <form action="{{url_for('cadautores')}}" method="post" class="cadastro-form">
        <label>Obra</label>
        <input type="text" name="obra" placeholder="Insira o nome da obra." required class="form-control">

        <label>Autor</label>
        <input type="text" name="autor" placeholder="Insira o nome do autor." required class="form-control">

        <label>Ano</label>
        <input type="text" name="ano" placeholder="Insira o ano de lancamento." required class="form-control">

        <div class="cadastro-actions">
            <input type="submit" value="Cadastrar" class="btn btn-success">
            <input type="reset" value="Limpar" class="btn btn-danger">
        </div>
    </form>
    <br>
    <hr>
    <h4>Autores cadastrados</h4>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Obra</th>
                <th>Autor</th>
                <th>Ano</th>
            </tr>
        </thead>
        <tbody>
            {% for autor in lista_autores %}
            <tr>
                <td>{{ autor.obra }}</td>
                <td>{{ autor.autor }}</td>
                <td>{{ autor.ano }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</main>
{% endblock content %}
